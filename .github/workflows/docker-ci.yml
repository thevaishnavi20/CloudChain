name: CloudChain CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cloudchain .

      - name: Verify Container Runs
        run: |
          docker run -d -p 80:80 --name cloudchain-test cloudchain
          sleep 3
          docker ps | grep cloudchain-test
          docker stop cloudchain-test

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to AWS EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            if [ ! -d ~/CloudChain ]; then
              git clone https://github.com/thevaishnavi20/CloudChain.git ~/CloudChain
            fi
            cd ~/CloudChain
            git pull origin main
            sudo docker stop cloudchain-app || true
            sudo docker rm cloudchain-app || true
            sudo docker build -t cloudchain .
            sudo docker run -d -p 80:80 --name cloudchain-app cloudchain
          "
