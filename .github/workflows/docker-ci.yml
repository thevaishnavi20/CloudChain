name: CloudChain CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cloudchain .

      - name: Verify Container Runs
        run: |
          docker run -d -p 80:80 --name cloudchain-test cloudchain
          sleep 3
          docker ps | grep cloudchain-test
          docker stop cloudchain-test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.EC2_HOST != '' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d ~/CloudChain ]; then
              git clone https://github.com/thevaishnavi20/CloudChain.git ~/CloudChain
            fi
            cd ~/CloudChain
            git pull origin main
            sudo docker stop cloudchain-app || true
            sudo docker rm cloudchain-app || true
            sudo docker build -t cloudchain .
            sudo docker run -d -p 80:80 --name cloudchain-app cloudchain
