name: CloudChain CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cloudchain .

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/CloudChain
            git pull origin main
            sudo docker stop cloudchain-app || true
            sudo docker rm cloudchain-app || true
            sudo docker build -t cloudchain .
            sudo docker run -d -p 80:80 --name cloudchain-app cloudchain